<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teka Nombor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <div class="card">

      <div class="label">Permainan</div>
      <h1 class="title">Teka<br><span>Nombor.</span></h1>

      <!-- Range selection -->
      <div class="range-row">
        <div class="range-field">
          <label>Min</label>
          <input type="number" id="range-min" value="1" min="0">
        </div>
        <div class="range-sep">—</div>
        <div class="range-field">
          <label>Max</label>
          <input type="number" id="range-max" value="100" min="1">
        </div>
      </div>

      <button class="btn btn-ghost" id="btn-generate" style="width:100%; margin-bottom:0;">Jana Nombor Random</button>

      <div class="divider"></div>

      <!-- Secret number display -->
      <div class="secret-block">
        <div class="label">Nombor Rahsia</div>
        <div class="secret-display hidden-num" id="secret-display">? ? ?</div>
      </div>

      <!-- Guess input -->
      <div class="guess-block">
        <label for="guess-input">Nombor Teka Kamu</label>
        <input type="number" id="guess-input" placeholder="0" disabled>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-check" disabled>Semak</button>
        <button class="btn btn-ghost" id="btn-reset">Reset</button>
      </div>

      <!-- Result -->
      <div class="result-block" id="result-block"></div>

      <!-- History -->
      <div class="history-block" id="history-block" style="display:none;">
        <div class="history-label">Rekod Teka</div>
        <div class="history-list" id="history-list"></div>
      </div>

    </div>
  </div>

  <!-- jQuery -->
  <script src="js/jquery-2.1.0.min.js"></script>
  <script>
    $(function () {

      var secretNumber = null;
      var revealed = false;
      var history = [];

      // Generate random number
      function generateNumber() {
        var min = parseInt($('#range-min').val());
        var max = parseInt($('#range-max').val());

        if (isNaN(min) || isNaN(max) || min >= max) {
          showResult('Tetapkan julat yang sah (Min < Max).', 'wrong', '');
          return;
        }

        secretNumber = Math.floor(Math.random() * (max - min + 1)) + min;
        revealed = false;
        history = [];

        $('#secret-display')
          .text('? ? ?')
          .removeClass('hidden-num')
          .addClass('hidden-num')
          .removeClass('pop');

        $('#guess-input').val('').prop('disabled', false).focus();
        $('#btn-check').prop('disabled', false);
        $('#result-block').empty();
        $('#history-block').hide();
        $('#history-list').empty();
      }

      // Check guess
      function checkGuess() {
        if (secretNumber === null) {
          showResult('Jana nombor dahulu.', 'wrong', '');
          return;
        }

        var guess = parseInt($('#guess-input').val());

        if (isNaN(guess)) {
          $('#guess-input').addClass('shake');
          setTimeout(function () { $('#guess-input').removeClass('shake'); }, 400);
          showResult('Masukkan nombor yang sah.', 'wrong', '');
          return;
        }

        var isCorrect = guess === secretNumber;

        // Add to history
        history.push({ val: guess, correct: isCorrect });
        renderHistory();

        if (isCorrect) {
          revealed = true;
          $('#secret-display')
            .text(secretNumber)
            .removeClass('hidden-num')
            .addClass('pop');
          setTimeout(function () { $('#secret-display').removeClass('pop'); }, 350);

          showResult('BETUL!', 'correct', 'Kamu teka ' + history.length + ' kali.');
          $('#btn-check').prop('disabled', true);
          $('#guess-input').prop('disabled', true);
        } else {
          var hint = guess < secretNumber ? 'Terlalu rendah. Cuba lebih tinggi.' : 'Terlalu tinggi. Cuba lebih rendah.';
          $('#guess-input').addClass('shake');
          setTimeout(function () { $('#guess-input').removeClass('shake'); }, 400);
          showResult('SALAH!', 'wrong', hint);
          $('#guess-input').val('').focus();
        }
      }

      function showResult(msg, type, sub) {
        var html = '<div class="result-msg ' + type + ' fade-in">' + msg + '</div>';
        if (sub) html += '<div class="result-sub fade-in">' + sub + '</div>';
        $('#result-block').html(html);
      }

      function renderHistory() {
        $('#history-block').show();
        $('#history-list').empty();
        $.each(history, function (i, item) {
          var tag = $('<span>')
            .addClass('history-tag ' + (item.correct ? 'correct' : 'wrong'))
            .text(item.val);
          $('#history-list').append(tag);
        });
      }

      function resetGame() {
        secretNumber = null;
        revealed = false;
        history = [];
        $('#secret-display').text('? ? ?').addClass('hidden-num');
        $('#guess-input').val('').prop('disabled', true);
        $('#btn-check').prop('disabled', true);
        $('#result-block').empty();
        $('#history-block').hide();
        $('#history-list').empty();
      }

      // Event bindings
      $('#btn-generate').on('click', generateNumber);
      $('#btn-check').on('click', checkGuess);
      $('#btn-reset').on('click', resetGame);

      $('#guess-input').on('keypress', function (e) {
        if (e.which === 13) checkGuess();
      });

    });
  </script>

</body>
</html>
