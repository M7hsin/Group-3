<!DOCTYPE html>
<html>
<head>
    <title>Teka Nombor</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        .container{
            width: 300px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input{
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teka Nombor (1 - 10)</h2>

    <input type="number" id="guess" placeholder="Masukkan nombor">

    <br>

    <button id="checkBtn">Semak</button>

    <div id="result"></div>
</div>

<script>
$(document).ready(function(){

    $("#checkBtn").click(function(){

        // Jana nombor rawak antara 1 hingga 10
        let randomNum = Math.floor(Math.random() * 10) + 1;

        // Ambil nombor yang dimasukkan pengguna
        let userNum = $("#guess").val();

        // Semak jawapan
        if(userNum == randomNum){
            $("#result").html(
                "✅ Betul! Nombor rawak ialah " + randomNum
            );
        }
        else{
            $("#result").html(
                "❌ Salah! Nombor rawak ialah " + randomNum
            );
        }

    });

});
</script>

</body>
</html>
